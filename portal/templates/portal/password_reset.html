<h2>Reset Password</h2>

<p>Enter your email and we will send you a reset link.</p>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send Reset Link</button>
</form>

<!-- BACK TO LOGIN -->
<div style="margin-top:15px;">
    <a href="{% url 'login' %}" style="color:#555; font-size:14px;">
        ← Back to Login
    </a>
</div>
